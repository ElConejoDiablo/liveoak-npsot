<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Pollinator garden</title>
  <desc id="desc">A native garden with goldenrod, Turk's cap, and butterflies in late-season light.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8dec8"/>
      <stop offset="46%" stop-color="#e6d1a7"/>
      <stop offset="100%" stop-color="#8c8258"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="21"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#sky)"/>
  <circle cx="1308" cy="182" r="118" fill="#eeb25a" opacity="0.92"/>
