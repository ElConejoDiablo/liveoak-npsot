    <path d="M184 1090 C210 980 214 872 202 736" stroke="#55663d" stroke-width="8" stroke-linecap="round"/>
    <path d="M244 1110 C272 990 284 888 278 756" stroke="#4a5f39" stroke-width="7" stroke-linecap="round"/>
    <path d="M1318 1088 C1312 970 1320 864 1338 744" stroke="#52633a" stroke-width="8" stroke-linecap="round"/>
    <path d="M1392 1100 C1390 986 1402 884 1426 770" stroke="#475836" stroke-width="7" stroke-linecap="round"/>
  </g>

  <g opacity="0.94">
    <ellipse cx="480" cy="910" rx="34" ry="18" fill="#d2694d"/>
    <ellipse cx="526" cy="866" rx="32" ry="18" fill="#d77658"/>
    <ellipse cx="570" cy="914" rx="30" ry="17" fill="#d2694d"/>
    <ellipse cx="1048" cy="904" rx="34" ry="18" fill="#e0b846"/>
    <ellipse cx="1088" cy="860" rx="30" ry="17" fill="#ddb143"/>
    <ellipse cx="1128" cy="914" rx="28" ry="16" fill="#d9ad41"/>
  </g>

  <g transform="translate(680 770) rotate(-5)">
