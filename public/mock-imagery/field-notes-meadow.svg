<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Field notes meadow</title>
  <desc id="desc">A quiet meadow scene with layered grasses, wildflowers, and a field notebook set into the foreground.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e8dfca"/>
      <stop offset="46%" stop-color="#e4d1aa"/>
      <stop offset="100%" stop-color="#8a845f"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="2" seed="14"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#sky)"/>
  <circle cx="1282" cy="188" r="118" fill="#e6b663" opacity="0.92"/>
  <ellipse cx="1116" cy="184" rx="340" ry="108" fill="#fff5e3" opacity="0.24" filter="url(#blur-soft)"/>

  <path d="M0 634 C220 578 456 588 714 652 C954 710 1188 720 1600 636 V1200 H0 Z" fill="#b6a97d"/>
  <path d="M0 754 C214 718 470 744 768 818 C1022 882 1278 892 1600 812 V1200 H0 Z" fill="#758054"/>
  <path d="M0 870 C278 852 538 904 850 986 C1080 1048 1322 1060 1600 976 V1200 H0 Z" fill="#33483a"/>

