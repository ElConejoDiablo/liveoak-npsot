<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Stewardship workday</title>
  <desc id="desc">Volunteers tending a native planting bed with tools, grasses, and young plants.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e6decb"/>
      <stop offset="46%" stop-color="#dbcaa8"/>
      <stop offset="100%" stop-color="#867f5d"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.84" numOctaves="2" seed="27"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>

