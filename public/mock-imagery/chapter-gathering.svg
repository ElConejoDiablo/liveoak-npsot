<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Chapter gathering</title>
  <desc id="desc">A chapter gathering in a native planting space with volunteers, tables, and prairie edges.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#e7dfcb"/>
      <stop offset="46%" stop-color="#dfceae"/>
      <stop offset="100%" stop-color="#8f8963"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.82" numOctaves="2" seed="6"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.13"/>
      </feComponentTransfer>
    </filter>
  </defs>

