    <ellipse cx="280" cy="776" rx="42" ry="16" fill="#678050"/>
    <ellipse cx="334" cy="726" rx="40" ry="16" fill="#678050"/>
    <circle cx="260" cy="670" r="18" fill="#cd7a8c"/>
    <circle cx="286" cy="640" r="16" fill="#c7798a"/>
    <circle cx="346" cy="698" r="15" fill="#cd7a8c"/>
