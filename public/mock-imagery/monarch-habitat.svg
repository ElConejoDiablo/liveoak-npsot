<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">Monarch habitat</title>
  <desc id="desc">Monarch butterflies crossing native habitat with milkweed, asters, and open sky.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#ebe1cb"/>
      <stop offset="42%" stop-color="#e0cb9e"/>
      <stop offset="100%" stop-color="#8d8157"/>
    </linearGradient>
    <filter id="blur-soft">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.86" numOctaves="2" seed="13"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.14"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1600" height="1200" fill="url(#sky)"/>
  <circle cx="1262" cy="208" r="124" fill="#e9a359" opacity="0.94"/>
  <ellipse cx="1066" cy="180" rx="340" ry="100" fill="#fff5e3" opacity="0.22" filter="url(#blur-soft)"/>

